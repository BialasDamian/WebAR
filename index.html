<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebAR – Marker HIRO z podglądem kamery</title>
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.0/dist/aframe-master.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ar.js@3.0.2/aframe/build/aframe-ar.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }
        /* Wymuszenie widoczności wideo AR.js jako tła */
        .a-arjs-video {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            z-index: -1 !important;
        }
        .ui-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 16px;
            color: white;
            z-index: 1000;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 14px;
        }
        .ui-panel button, .ui-panel label {
            background: #2c3e66;
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .ui-panel button:hover, .ui-panel label:hover {
            background: #1e2a47;
        }
        .file-label {
            background: #4a627a;
            display: inline-block;
        }
        input[type="file"] {
            display: none;
        }
        .status {
            background: #000000aa;
            padding: 8px 14px;
            border-radius: 40px;
            flex: 1;
            min-width: 160px;
            text-align: center;
            font-size: 13px;
        }
        .close-panel {
            background: #aa2e2e;
        }
        .marker-tip {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: #ffd966;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 1000;
            pointer-events: none;
        }
        @media (max-width: 600px) {
            .ui-panel {
                flex-direction: column;
                align-items: stretch;
                bottom: 10px;
                left: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <a-scene
        id="arScene"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        renderer="antialias: true; alpha: false;"
        vr-mode-ui="enabled: false">
        
        <a-marker id="hiroMarker" preset="hiro">
            <a-box id="defaultModel" position="0 0.5 0" color="#FF5722" scale="0.6 0.6 0.6"
                   animation="property: rotation; to: 0 360 0; dur: 4000; loop: true; easing: linear;">
                <a-material color="#FF5722" emissive="#442200" emissive-intensity="0.3"></a-material>
            </a-box>
        </a-marker>
        
        <a-light type="ambient" intensity="0.6"></a-light>
        <a-light type="directional" intensity="0.8" position="1 2 1"></a-light>
        <a-light type="directional" intensity="0.5" position="-1 1 -1"></a-light>
    </a-scene>

    <div class="ui-panel">
        <button id="startCameraBtn">📷 Uruchom kamerę</button>
        <label class="file-label">
            📁 Wczytaj model 3D (.glb/.gltf)
            <input type="file" id="modelFile" accept=".glb,.gltf">
        </label>
        <label class="file-label">
            🖼️ Tekstura (jpg/png)
            <input type="file" id="textureFile" accept="image/jpeg,image/png">
        </label>
        <button id="resetModelBtn" style="background:#3a6b4b;">⟳ Przywróć domyślny</button>
        <div class="status" id="statusMsg">✅ Gotowy – kliknij „Uruchom kamerę”</div>
        <button class="close-panel" id="hidePanelBtn">✖ Ukryj panel</button>
    </div>
    <div class="marker-tip">🎯 Wskaż marker HIRO (wydrukuj go z AR.js)</div>

    <script>
        (function() {
            const scene = document.getElementById('arScene');
            const startBtn = document.getElementById('startCameraBtn');
            const modelInput = document.getElementById('modelFile');
            const textureInput = document.getElementById('textureFile');
            const resetBtn = document.getElementById('resetModelBtn');
            const statusDiv = document.getElementById('statusMsg');
            const hidePanelBtn = document.getElementById('hidePanelBtn');
            const marker = document.getElementById('hiroMarker');
            
            let currentModelEntity = null;
            let currentTextureUrl = null;
            let cameraStream = null;
            
            function setStatus(msg, isError = false) {
                statusDiv.textContent = msg;
                statusDiv.style.background = isError ? '#aa2e2eaa' : '#000000aa';
                console.log(`[Status] ${msg}`);
            }
            
            async function startCamera() {
                setStatus('⏳ Prośba o dostęp do kamery...');
                try {
                    // Uzyskaj dostęp do kamery (preferuj tylną)
                    cameraStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { exact: "environment" } }
                    }).catch(() => navigator.mediaDevices.getUserMedia({ video: true }));
                    
                    setStatus('✅ Dostęp do kamery przyznany. Szukam elementu wideo...');
                    
                    // Funkcja do znajdowania elementu wideo utworzonego przez AR.js
                    const findVideoElement = () => {
                        return document.querySelector('video.a-arjs-video') || document.querySelector('a-scene video');
                    };
                    
                    // Spróbuj znaleźć od razu, jeśli nie, użyj obserwatora
                    let videoElement = findVideoElement();
                    if (videoElement) {
                        attachVideoStream(videoElement);
                    } else {
                        // Obserwuj zmiany w DOM, aby wykryć dodanie wideo
                        const observer = new MutationObserver((mutations, obs) => {
                            const video = findVideoElement();
                            if (video) {
                                obs.disconnect();
                                attachVideoStream(video);
                            }
                        });
                        observer.observe(document.body, { childList: true, subtree: true });
                        // Fallback timeout
                        setTimeout(() => {
                            if (!videoElement) {
                                observer.disconnect();
                                const video = findVideoElement();
                                if (video) attachVideoStream(video);
                                else setStatus('❌ Nie znaleziono elementu wideo AR.js. Spróbuj odświeżyć stronę.', true);
                            }
                        }, 5000);
                    }
                } catch (err) {
                    console.error(err);
                    setStatus('❌ Brak dostępu do kamery. Sprawdź uprawnienia i HTTPS.', true);
                }
            }
            
            function attachVideoStream(videoElement) {
                if (!cameraStream) return;
                videoElement.srcObject = cameraStream;
                videoElement.play().then(() => {
                    setStatus('📷 Kamera aktywna. Skieruj na marker HIRO.');
                    // Restart AR.js, aby rozpoczął detekcję
                    if (scene.components && scene.components.arjs) {
                        scene.components.arjs.restart();
                    }
                }).catch(err => {
                    console.error('Błąd odtwarzania wideo:', err);
                    setStatus('⚠️ Błąd odtwarzania wideo. Spróbuj ponownie.', true);
                });
            }
            
            startBtn.addEventListener('click', startCamera);
            
            // ---------- Obsługa modeli ----------
            function removeCurrentModel() {
                if (currentModelEntity && currentModelEntity.parentNode === marker) {
                    marker.removeChild(currentModelEntity);
                    currentModelEntity = null;
                }
                const defaultModel = document.getElementById('defaultModel');
                if (defaultModel && defaultModel.parentNode !== marker) {
                    marker.appendChild(defaultModel);
                } else if (defaultModel) {
                    defaultModel.setAttribute('visible', 'true');
                }
            }
            
            function loadModelFromFile(file) {
                return new Promise((resolve, reject) => {
                    const url = URL.createObjectURL(file);
                    const testEntity = document.createElement('a-entity');
                    testEntity.setAttribute('gltf-model', url);
                    testEntity.addEventListener('model-loaded', () => {
                        resolve({ url, entity: testEntity });
                    });
                    testEntity.addEventListener('model-error', (err) => {
                        URL.revokeObjectURL(url);
                        reject(err);
                    });
                    scene.appendChild(testEntity);
                    setTimeout(() => {
                        if (testEntity.parentNode) scene.removeChild(testEntity);
                    }, 100);
                });
            }
            
            function applyTextureToModel(textureUrl, modelEntity) {
                if (!modelEntity) return;
                if (modelEntity.components && modelEntity.components.material) {
                    modelEntity.setAttribute('material', `src: ${textureUrl}; repeat: 1 1;`);
                    setStatus('✅ Tekstura nałożona');
                } else {
                    const children = modelEntity.querySelectorAll('[material]');
                    if (children.length) {
                        children.forEach(child => {
                            child.setAttribute('material', `src: ${textureUrl};`);
                        });
                        setStatus('✅ Tekstura nałożona na elementy modelu');
                    } else {
                        setStatus('⚠️ Tekstura nie została nałożona – model nie obsługuje prostego materiału', false);
                    }
                }
            }
            
            async function replaceModelWithFile(file) {
                if (!file) return;
                setStatus(`⏳ Wczytywanie: ${file.name}...`);
                try {
                    const { url, entity } = await loadModelFromFile(file);
                    const newModel = document.createElement('a-entity');
                    newModel.setAttribute('gltf-model', url);
                    newModel.setAttribute('scale', '0.5 0.5 0.5');
                    newModel.setAttribute('position', '0 0 0');
                    newModel.setAttribute('animation', 'property: rotation; to: 0 360 0; dur: 5000; loop: true; easing: linear;');
                    
                    newModel.addEventListener('model-loaded', () => {
                        setStatus(`✅ Model ${file.name} wczytany`);
                        if (currentTextureUrl) applyTextureToModel(currentTextureUrl, newModel);
                        URL.revokeObjectURL(url);
                    });
                    newModel.addEventListener('model-error', () => {
                        setStatus(`❌ Błąd modelu ${file.name}`, true);
                        URL.revokeObjectURL(url);
                    });
                    
                    removeCurrentModel();
                    marker.appendChild(newModel);
                    currentModelEntity = newModel;
                } catch (err) {
                    setStatus(`❌ Błąd: ${err.message}`, true);
                }
            }
            
            textureInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const url = URL.createObjectURL(file);
                currentTextureUrl = url;
                if (currentModelEntity) {
                    applyTextureToModel(url, currentModelEntity);
                } else {
                    const defaultModel = document.getElementById('defaultModel');
                    if (defaultModel && defaultModel.parentNode === marker) {
                        defaultModel.setAttribute('material', `src: ${url}`);
                        setStatus('🖼️ Tekstura nałożona na domyślny model');
                    } else {
                        setStatus('🖼️ Tekstura wczytana – pojawi się po załadowaniu modelu');
                    }
                }
            });
            
            resetBtn.addEventListener('click', () => {
                removeCurrentModel();
                if (currentTextureUrl && document.getElementById('defaultModel')) {
                    document.getElementById('defaultModel').setAttribute('material', `src: ${currentTextureUrl}`);
                }
                setStatus('🔄 Przywrócono domyślny model');
            });
            
            modelInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) replaceModelWithFile(file);
            });
            
            hidePanelBtn.addEventListener('click', () => {
                document.querySelector('.ui-panel').style.display = 'none';
                setStatus('Panel ukryty (odśwież stronę, aby przywrócić)');
            });
            
            if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
                setStatus('⚠️ UWAGA: Aplikacja wymaga HTTPS. Użyj GitHub Pages lub serwera z SSL.', true);
            }
        })();
    </script>
</body>
</html>
