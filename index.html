<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebAR – Marker Hiro z animowanym modelem</title>
    <style>
        /* Ukryj paski przewijania i ustaw pełny ekran */
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Prosta instrukcja nakładki (zniknie automatycznie po 5 sekundach) */
        .info {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 14px;
            z-index: 100;
            backdrop-filter: blur(5px);
            pointer-events: none;
            transition: opacity 1s;
        }
        /* Przycisk do ręcznego ukrycia instrukcji (opcjonalnie) */
        .close-info {
            pointer-events: auto;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            margin-left: 10px;
            cursor: pointer;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <!-- Scena AR z wbudowaną obsługą kamery -->
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        renderer="antialias: true; alpha: false;"
        vr-mode-ui="enabled: false">
        
        <!-- Kamera jest automatycznie zarządzana przez AR.js – nie trzeba dodawać osobnego znacznika kamery -->

        <!-- Definicja markera (wzorzec Hiro) -->
        <a-marker preset="hiro">
            <!-- 
                Animowany model 3D: obracający się sześcian.
                Można zastąpić go dowolnym modelem .glb (przykład zakomentowany poniżej).
            -->
            <a-box 
                position="0 0.5 0" 
                color="#FF5722" 
                material="shader: standard; roughness: 0.3; metalness: 0.1;"
                scale="0.8 0.8 0.8"
                animation="property: rotation; to: 0 360 0; dur: 4000; loop: true; easing: linear;">
                <!-- Dodajemy teksturę/emisyjną dla lepszego efektu -->
                <a-material color="#FF5722" emissive="#442200" emissive-intensity="0.5"></a-material>
            </a-box>

            <!-- OPCJONALNIE: Przykład użycia zewnętrznego modelu .glb (zakomentowany)
            <a-entity 
                gltf-model="https://threejs.org/examples/models/gltf/Horse.glb"
                scale="0.5 0.5 0.5"
                position="0 0 0"
                animation="property: rotation; to: 0 360 0; dur: 5000; loop: true; easing: linear;">
            </a-entity>
            -->
        </a-marker>

        <!-- Dodatkowe oświetlenie, aby model wyglądał lepiej -->
        <a-light type="ambient" intensity="0.5"></a-light>
        <a-light type="directional" intensity="0.8" position="1 2 1"></a-light>
        <a-light type="directional" intensity="0.5" position="-1 1 -1"></a-light>

        <!-- Opcjonalny znacznik pomocniczy – tło (nie wpływa na AR) -->
        <a-entity camera></a-entity>
    </a-scene>

    <!-- Nakładka z instrukcją -->
    <div id="infoBox" class="info">
        📱 Skieruj kamerę na marker Hiro (wydrukuj go ze strony AR.js). Model pojawi się nad markerem.<br>
        ⚠️ Wymagane uprawnienia do kamery i połączenie HTTPS.
        <button class="close-info" onclick="document.getElementById('infoBox').style.display='none';">✖</button>
    </div>

    <script>
        // Automatyczne ukrycie instrukcji po 7 sekundach (ale zostawiamy możliwość zamknięcia)
        setTimeout(() => {
            const info = document.getElementById('infoBox');
            if (info) info.style.opacity = '0';
            setTimeout(() => {
                if (info) info.style.display = 'none';
            }, 1000);
        }, 7000);

        // Dodatkowo log, aby potwierdzić inicjalizację AR
        window.addEventListener('load', () => {
            console.log('Aplikacja WebAR uruchomiona. Oczekiwanie na marker Hiro...');
        });
    </script>
</body>
</html>
